name: Monorepo CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths:
      - 'src/**'
      - '.github/workflows/ci.cd.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/ci.cd.yml'

permissions:
  contents: write

jobs:

  test_matrix:
    name: Backend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]

    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: src/backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  sonarqube_analysis:
    name: SonarQube Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Full History
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: |
            -Dsonar.projectKey=monorepo-backend
            -Dsonar.projectName=Monorepo_Backend
            -Dsonar.sources=src/backend

  simulate_deployment:
    name: Simulate Deployment
    runs-on: ubuntu-latest

    needs:
      - test_matrix
      - sonarqube_analysis

    steps:
      - name: Simulated Production Deployment
        run: |
          echo "================================="
          echo "Deployment Simulation Started"
          echo "Frontend and Backend deployed"
          echo "Deployment Simulation Complete"
          echo "================================="

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    needs:
      - simulate_deployment

    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Generate Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true